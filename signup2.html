<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bus Tracker - Register</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <h2>School Bus Tracker <span>🚌</span></h2>
        <form id="registerForm" onsubmit="return validateForm()">
            <fieldset class="parent-info">
                <legend>Parent Information</legend>
                <div class="input-row">
                    <label>Father's Name:</label>
                    <input type="text" id="fatherName" name="fatherName" required>
                    
                    <label>Father's Phone Number:</label>
                    <input type="tel" id="fatherPhone" name="fatherPhone" required>
                </div>

                <div class="input-row">
                    <label>Mother's Name:</label>
                    <input type="text" id="motherName" name="motherName" required>
                    
                    <label>Mother's Phone Number:</label>
                    <input type="tel" id="motherPhone" name="motherPhone" required>
                </div>
            </fieldset>

            <fieldset class="account-info">
                <legend>Account Information</legend>
                <label>Create Username:</label>
                <input type="text" id="username" name="username" required>
                
                <label>Create New Password:</label>
                <input type="password" id="password" name="password" required>
                
                <label>Confirm New Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </fieldset>
            
            <button type="submit" class="submit-btn">Submit</button>
        </form>
        <p class="login-link">
            Already have an account? <a href="login.html">SignIn</a>
            
    
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
