<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <link rel="stylesheet" href="passwordStyles.css"> <!-- Link to external CSS -->
</head>
<body>
    <div class="reset-password-container">
        <h1>Set New Password</h1>
        <form id="resetPasswordForm">
            <label for="newPassword">New Password:</label>
            <input type="password" id="newPassword" name="newPassword" aria-label="New Password" required>
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" aria-label="Confirm Password" required>
            <button id="resetButton" type="button">Reset Password</button>
        </form>

        <!-- Login link positioned below the button -->
        <div class="login-link">
            Go to login page <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        // Get elements
        const resetButton = document.getElementById('resetButton');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');

        // Add click event listener
        resetButton.addEventListener('click', () => {
            // Validate that passwords match
            if (newPassword.value === confirmPassword.value) {
                alert('Your password has been set successfully!');
                // Optionally, reset the form
                document.getElementById('resetPasswordForm').reset();
            } else {
                alert('Passwords do not match. Please try again.');
            }
        });
    </script>
</body>
</html>
