<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="passwordStyles.css"> <!-- Link to external CSS -->
</head>
<body>
    <div class="reset-password-container">
        <h1>Reset Password</h1>
        <form id="resetPasswordForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" aria-label="Username" required>

            <label for="newPassword">New Password:</label>
            <input type="password" id="newPassword" name="newPassword" aria-label="New Password" required>

            <button id="resetButton" type="button">Reset Password</button>
        </form>

        <div class="login-link">
            Go to login page? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        // Get elements
        const resetButton = document.getElementById('resetButton');

        // Add click event listener
        resetButton.addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const newPassword = document.getElementById('newPassword').value.trim();

            if (!username || !newPassword) {
                alert('Please fill out all fields.');
                return;
            }

            try {
                // Send request to the backend
                const response = await fetch('http://localhost:3000/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, newPassword }),
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Password updated successfully!');
                    document.getElementById('resetPasswordForm').reset();
                } else {
                    alert(data.error || 'Failed to reset password. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while resetting the password. Please try again.');
            }
        });
    </script>
</body>
</html>
