<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bus Tracker - Drivers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #000;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
        }

        header h1 img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 16px;
        }

        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            text-align: center;
            background-image: url('./assets/bus.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            min-height: calc(100vh - 60px);
        }

        .main-content h2 {
            color: #000;
            font-size: 36px;
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 5px;
        }

        .container {
            background: rgb(255, 255, 255);
            padding: 2rem;
            border-radius: 10px;
            width: 90%;
            max-width: fit-content;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 2px solid #333;
            margin: 40px;
            overflow: scroll;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .form input {
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: background 0.3s ease;
            width: auto;
        }

        .form input:focus {
            background: rgba(255, 255, 255, 1);
            outline: none;
            border-color: #2575fc;
        }

        .form button {
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            background: #fba300;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .form button:hover {
            background: #f5b235;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 5px;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
        }

        th {
            background: #f5b53f;
            color: #fff;
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.8);
        }

        tr:hover {
            background: rgba(37, 117, 252, 0.1);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .actions button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .actions button.edit {
            background: #28a745;
            color: #fff;
        }

        .actions button.delete {
            background: #dc3545;
            color: #fff;
        }

        .actions button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <header>
        <div class="title">
            <h2>Admin - School Bus Tracker <span>🚌</span></h2>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="#">Drivers</a>
            <a href="students.html">Students</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <h2>Manage Drivers</h2>
            <!-- Add Driver Form -->
            <form id="addDriverForm" class="form">
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" placeholder="Last Name" required>
                <input type="email" id="username" placeholder="Username" required>
                <button type="submit">Add Driver</button>
            </form>

            <table id="driversTable">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Username</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
    </main>
    <script src="./scripts/drivers.js"></script>
</body>
</html>
