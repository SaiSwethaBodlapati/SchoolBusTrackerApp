<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bus Tracker - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>School Bus Tracker <span>🚌</span></h2>
        <form id="registerForm" onsubmit="return handleFormSubmit(event)">
            <!-- Student Information -->
            <fieldset>
                <legend>Student Information</legend>
                <div class="input-row">
                    <label>First Name:</label>
                    <input type="text" id="firstName" name="firstName" required>
                    
                    <label>Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required>
                    
                    <label>Class:</label>
                    <input type="text" id="class" name="class" required>
                </div>
                <div class="input-row">
                    <label>Bus Stop:</label>
                    <input type="text" id="busStop" name="busStop" required>
                    
                    <label>Student Identification Number:</label>
                    <input type="text" id="studentId" name="studentId" required>
                    
                    <label>Bus Pass ID:</label>
                    <input type="text" id="busPassId" name="busPassId" required>
                </div>
            </fieldset>

            <!-- Address Information -->
            <fieldset>
                <legend>Address</legend>
                <label>Address Line 1:</label>
                <input type="text" id="addressLine1" name="addressLine1" required>
                
                <label>Address Line 2:</label>
                <input type="text" id="addressLine2" name="addressLine2">
                
                <label>City:</label>
                <input type="text" id="city" name="city" required>
                
                <label>ZIP Code:</label>
                <input type="text" id="zipCode" name="zipCode" required>
            </fieldset>

            <!-- Parent Information -->
            <fieldset>
                <legend>Parent Information</legend>
                <div class="input-row">
                    <label>Father's Name:</label>
                    <input type="text" id="fatherName" name="fatherName" required>
                    
                    <label>Father's Phone Number:</label>
                    <input type="tel" id="fatherPhone" name="fatherPhone" required>
                </div>
                <div class="input-row">
                    <label>Mother's Name:</label>
                    <input type="text" id="motherName" name="motherName" required>
                    
                    <label>Mother's Phone Number:</label>
                    <input type="tel" id="motherPhone" name="motherPhone" required>
                </div>
            </fieldset>

            <!-- Account Information -->
            <fieldset>
                <legend>Account Information</legend>
                <label>Create Username:</label>
                <input type="text" id="username" name="username" required>
                
                <label>Create New Password:</label>
                <input type="password" id="password" name="password" required>
                
                <label>Confirm New Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </fieldset>

            <button type="submit" class="submit-btn">Register</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="login.html">Sign In</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
